<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sitter Rating</title>

    <style>
        /* page styling */
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #faf7f5;
            margin: 0;
        }

        /* navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #444;
            padding: 15px 40px;
        }

        nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* main container */
        .container {
            max-width: 700px;
            margin: 40px auto;
        }

        /* card layout */
        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        h2 {
            margin-top: 0;
            color: #2c3e50;
        }

        h3 {
            margin-top: 25px;
            color: #2c3e50;
        }

        /* review display */
        .review {
            background-color: #eef6ff;
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
        }

        .stars {
            color: #f39c12;
            font-weight: bold;
        }

        /* back link */
        .back-link {
            display: inline-block;
            margin-top: 15px;
            color: #3498db;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<!-- navbar -->
<nav>
    <div>
        <a href="/">Home</a>
        <a href="/sitters">Sitters</a>
    </div>

    <div>
        <a href="/dashboard">Dashboard</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<div class="container">

    <div class="card">

        <!-- sitter name -->
        <h2 th:text="${sitter.firstName + ' ' + sitter.lastName}"></h2>

        <!-- average rating -->
        <p>
            <strong>Average Rating:</strong>
            <span th:text="${averageRating != null ? averageRating : 0}"></span> / 5 ⭐
        </p>

        <h3>Reviews</h3>

        <!-- no reviews -->
        <p th:if="${#lists.isEmpty(reviews)}">No reviews yet.</p>

        <!-- list reviews -->
        <div th:each="review : ${reviews}" class="review">

            <p class="stars">
                Rating:
                <span th:text="${review.rating}"></span> ⭐
            </p>

            <p>
                <strong>Comment:</strong>
                <span th:text="${review.comment}"></span>
            </p>

        </div>

        <!-- back link -->
        <a href="/sitters" class="back-link">← Back to Sitters</a>

    </div>

</div>

</body>
</html>
