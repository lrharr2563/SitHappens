<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - SitHappens</title>

    <style>
        /* page styling */
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #faf7f5;
            margin: 0;
        }

        /* navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #444;
            padding: 15px 40px;
        }

        nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
            font-weight: 500;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* center login card */
        .wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 85vh;
        }

        /* login card */
        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.08);
        }

        h2 {
            margin-top: 0;
            color: #2c3e50;
        }

        label {
            font-weight: 500;
            font-size: 14px;
        }

        /* input fields */
        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        /* login button */
        button {
            padding: 10px;
            width: 100%;
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #cf711f;
        }

        /* extra links */
        .links {
            margin-top: 15px;
            text-align: center;
        }

        .links a {
            display: block;
            margin-top: 8px;
            color: #3498db;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        /* error message */
        .error {
            color: red;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>

<body>

<!-- navbar -->
<nav>
    <div>
        <a href="/">Home</a>
        <a href="/sitters">Sitters</a>
    </div>

    <div>
        <a href="/login">Login</a>
        <a href="/register">Register</a>
    </div>
</nav>

<div class="wrapper">

    <div class="container">

        <h2>🔐 Login</h2>

        <!-- login form -->
        <form action="/login" method="post">

            <label>Email:</label>
            <input type="email" name="email" required>

            <label>Password:</label>
            <input type="password" name="password" required>

            <button type="submit">Login</button>

        </form>

        <!-- error message -->
        <p th:if="${error}" th:text="${error}" class="error"></p>

        <!-- links -->
        <div class="links">
            <a href="/forgot-password">Forgot Password?</a>
            <a href="/register">Don't have an account? Register</a>
        </div>

    </div>

</div>

</body>
</html>
