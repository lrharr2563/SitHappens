<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Pet</title>

    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #faf7f5;
            margin: 0;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #444;
            padding: 15px 40px;
        }

        nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
            font-weight: 500;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 500px;
            margin: 60px auto;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        textarea {
            resize: vertical;
        }

        .btn {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn:hover {
            background-color: #219150;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #2980b9;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <div>
        <a href="/">Home</a>
        <a href="/sitters">Sitters</a>
    </div>

    <div>
        <a href="/dashboard">Dashboard</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<div class="container">
    <div class="card">

        <h2>Edit Pet 🐾</h2>

        <form th:action="@{/update-pet}" method="post" enctype="multipart/form-data">

            <input type="hidden" name="id" th:value="${pet.id}" />

            <label>Name:</label>
            <input type="text" name="name" th:value="${pet.name}" required>

            <label>Type:</label>
            <input type="text" name="type" th:value="${pet.type}" required>

            <label>Age:</label>
            <input type="number" name="age" th:value="${pet.age}">

            <label>Breed:</label>
            <input type="text" name="breed" th:value="${pet.breed}">

            <label>Notes:</label>
            <textarea name="notes" rows="3" th:text="${pet.notes}"></textarea>

            <label>Update Photo:</label>
            <input type="file" name="photo">

            <button class="btn" type="submit">
                Update Pet
            </button>

        </form>

        <a href="/dashboard" class="back-link">← Back to Dashboard</a>

    </div>
</div>

</body>
</html>
