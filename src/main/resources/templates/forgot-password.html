<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reset Password</title>

    <style>
        /* page styling */
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #faf7f5;
            margin: 0;
        }

        /* navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #444;
            padding: 15px 40px;
        }

        nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
            font-weight: 500;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* main container */
        .container {
            max-width: 400px;
            margin: 80px auto;
        }

        /* card layout */
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: 500;
        }

        /* input fields */
        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        /* button */
        .btn {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background-color: #2980b9;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn:hover {
            background-color: #21618c;
        }
    </style>
</head>

<body>

<!-- navbar -->
<nav>
    <div>
        <a href="/">Home</a>
        <a href="/sitters">Sitters</a>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h2>Reset Your Password</h2>

        <!-- reset form -->
        <form action="/reset-password" method="post">

            <label>Email:</label>
            <input type="email" name="email" required>

            <label>New Password:</label>
            <input type="password" name="newPassword" required>

            <button class="btn" type="submit">
                Reset Password
            </button>

        </form>
    </div>
</div>

</body>
</html>
