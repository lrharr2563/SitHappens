<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Available Sitters - SitHappens</title>

    <style>

        /* page styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            padding: 40px;
            margin: 0;
        }

        /* header */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
        }

        /* main container */
        .container {
            max-width: 800px;
            margin: auto;
        }

        /* sitter card */
        .card {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        /* rating link */
        .rating-link {
            color: #3498db;
            text-decoration: none;
        }

        .rating-link:hover {
            text-decoration: underline;
        }

        /* request button */
        .request-link {
            display: inline-block;
            padding: 8px 12px;
            background-color: #27ae60;
            color: white;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 10px;
        }

        .request-link:hover {
            background-color: #219150;
        }

        /* no sitters message */
        .no-sitters {
            font-style: italic;
            color: #7f8c8d;
        }

        /* navbar */
        .navbar {
            margin-top: 15px;
        }

        .navbar a {
            margin-right: 20px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 16px;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<div class="container">

    <!-- header / nav -->
    <header>
        <h1>🐶 Available Sitters</h1>
        <p>Find trusted sitters for your pets</p>

        <nav class="navbar">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/sitters}">Sitters</a>
            <a th:href="@{/bookings}">Bookings</a>
            <a th:href="@{/admin}">Admin</a>
        </nav>

    </header>

    <!-- no sitters -->
    <div th:if="${#lists.isEmpty(sitters)}" class="no-sitters">
        No sitters available yet.
    </div>

    <!-- list sitters -->
    <div th:each="sitter : ${sitters}" class="card">

        <p>
            <strong>Name:</strong>
            <span th:text="${sitter.firstName}"></span>
            <span th:text="${sitter.lastName}"></span>
        </p>

        <p>
            <strong>Email:</strong>
            <span th:text="${sitter.email}"></span>
        </p>

        <!-- rating link -->
        <p>
            <a th:href="@{/sitter-rating/{id}(id=${sitter.id})}" class="rating-link">
                View Rating
            </a>
        </p>

        <!-- request booking -->
        <p>
            <a th:href="@{/request-booking/{id}(id=${sitter.id})}" class="request-link">
                Request Service
            </a>
        </p>

    </div>

</div>

</body>
</html>
