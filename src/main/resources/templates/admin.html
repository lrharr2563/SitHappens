<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard - SitHappens</title>

    <style>

        /* page styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            padding: 40px;
            margin: 0;
        }

        /* header section */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
        }

        /* main container */
        .container {
            max-width: 800px;
            margin: auto;
        }

        /* card layout */
        .card {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        /* navbar inside header */
        .navbar {
            margin-top: 15px;
        }

        .navbar a {
            margin-right: 20px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<div class="container">

<!-- header / navigation -->
<header>
    <h1>⚙ Admin Dashboard</h1>
    <p>Manage users and site activity</p>

    <!-- nav links -->
    <nav class="navbar">
        <a th:href="@{/}">Home</a>
        <a th:href="@{/sitters}">Sitters</a>
        <a th:href="@{/bookings}">Bookings</a>
        <a th:href="@{/admin}">Admin</a>
    </nav>

</header>

<!-- admin tools section -->
<div class="card">
    <h3>Admin Tools</h3>

    <p>Future features:</p>

    <ul>
        <li>Manage users</li>
        <li>Remove accounts</li>
        <li>View all bookings</li>
        <li>Moderate reviews</li>
    </ul>

</div>

</div>

</body>
</html>
