<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Pet</title>

    <style>
        /* page styling */
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
        }

        /* navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #4a4a4a;
            padding: 12px 30px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-size: 15px;
            font-weight: 500;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        .nav-right a:last-child {
            margin-right: 0;
        }

        /* form container */
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        h1 {
            margin-top: 0;
            color: #2c3e50;
        }

        label {
            font-weight: 500;
        }

        /* inputs */
        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        /* button */
        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #219150;
        }

        /* back link */
        .back-link {
            display: block;
            margin-top: 15px;
            text-align: center;
            color: #2c3e50;
            text-decoration: none;
        }
    </style>

</head>
<body>

<!-- navbar -->
<nav class="navbar">
    <div>
        <a href="/">Home</a>
        <a href="/sitters">Sitters</a>
    </div>

    <div class="nav-right">
        <a href="/dashboard">Dashboard</a>
        <a href="/logout">Logout</a>
    </div>
</nav>

<!-- pet form -->
<div class="container">

    <h1>Add Your Pet 🐾</h1>

    <!-- form to add pet -->
    <form action="/save-pet" method="post" enctype="multipart/form-data">

        <label>Pet Name:</label>
        <input type="text" name="name" required>

        <label>Type (Dog, Cat, etc.):</label>
        <input type="text" name="type" required>

        <label>Age:</label>
        <input type="number" name="age">

        <label>Breed:</label>
        <input type="text" name="breed">

        <label>About Your Pet:</label>
        <textarea name="notes" rows="4"
            placeholder="Likes, dislikes, food, toys, behavior..."></textarea>

        <label>Upload Photo:</label>
        <input type="file" name="photo" accept="image/*">

        <button type="submit">Save Pet</button>

    </form>

    <!-- back to dashboard -->
    <a href="/dashboard" class="back-link">⬅ Back to Dashboard</a>

</div>

</body>
</html>
