<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>SitHappens</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            padding: 40px;
            margin: 0;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
        }

        h2 {
            color: #34495e;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        .role-owner {
            color: #2980b9;
            font-weight: bold;
        }

        .role-sitter {
            color: #27ae60;
            font-weight: bold;
        }

        button {
            padding: 10px 15px;
            background-color: #3498db;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background-color: #2980b9;
        }

        .rating {
            margin-top: 20px;
            font-weight: bold;
            color: #e67e22;
        }
    </style>
</head>
<body>

<div class="container">

    <header>
        <h1>🐾 SitHappens</h1>
        <p>Your trusted pet sitting platform</p>
    </header>

    <h2>All Users</h2>

    <div th:if="${#lists.isEmpty(users)}">
        <p>No users yet. Click below to add one.</p>
    </div>

    <div th:each="user : ${users}" class="card">
        <p>
            <strong>Name:</strong> 
            <span th:text="${user.firstName}"></span> 
            <span th:text="${user.lastName}"></span>
        </p>

        <p>
            <strong>Email:</strong> 
            <span th:text="${user.email}"></span>
        </p>

        <p>
            <strong>Role:</strong>
            <span th:text="${user.role}"
                  th:classappend="${user.role == 'OWNER'} ? 'role-owner' : 'role-sitter'">
            </span>
        </p>

        <div>
            <a th:href="@{/sitter-rating/{id}(id=${user.id})}">
                Check Rating
            </a>
        </div>
    </div>

    <form th:action="@{/create-user}" method="post">
        <button type="submit">Add Test User</button>
    </form>

    <div class="rating" th:if="${ratingMessage}">
        <p th:text="${ratingMessage}"></p>
    </div>

</div>

</body>
</html>
