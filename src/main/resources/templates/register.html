<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - SitHappens</title>

    <style>
        /* page styling */
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #faf7f5;
            margin: 0;
        }

        /* navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #444;
            padding: 15px 40px;
        }

        nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
            font-weight: 500;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* form container */
        .container {
            max-width: 420px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        }

        h2 {
            margin-top: 0;
            color: #2c3e50;
            text-align: center;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: 500;
        }

        /* input fields */
        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #2980b9;
        }

        /* register button */
        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background-color: #2980b9;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background-color: #21618c;
        }

        /* login link */
        .links {
            margin-top: 15px;
            text-align: center;
        }

        .links a {
            color: #3498db;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<!-- navbar -->
<nav>
    <div>
        <a href="/">Home</a>
        <a href="/sitters">Sitters</a>
    </div>

    <div>
        <a href="/login">Login</a>
    </div>
</nav>

<div class="container">

    <h2>Create an Account</h2>

    <!-- register form -->
    <form action="/register" method="post">

        <label>First Name</label>
        <input type="text" name="firstName" required>

        <label>Last Name</label>
        <input type="text" name="lastName" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <label>Role</label>
        <select name="role">
            <option value="OWNER">Owner</option>
            <option value="SITTER">Sitter</option>
        </select>

        <button type="submit">Register</button>

    </form>

    <!-- login link -->
    <div class="links">
        <p>Already have an account?</p>
        <a href="/login">Login here</a>
    </div>

</div>

</body>
</html>
