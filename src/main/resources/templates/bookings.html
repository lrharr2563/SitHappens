<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bookings - SitHappens</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            padding: 40px;
            margin: 0;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        h1 {
            margin: 0;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        .navbar {
            margin-top: 15px;
        }

        .navbar a {
            margin-right: 20px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<div class="container">

<header>
    <h1>📅 Bookings</h1>
    <p>View and manage sitter bookings</p>

    <nav class="navbar">
        <a th:href="@{/}">Home</a>
        <a th:href="@{/sitters}">Sitters</a>
        <a th:href="@{/bookings}">Bookings</a>
        <a th:href="@{/admin}">Admin</a>
    </nav>

</header>

<div th:if="${#lists.isEmpty(bookings)}" class="card">
    <p>No bookings yet.</p>
</div>

<div th:each="booking : ${bookings}" class="card">

    <p>
    <strong>Owner:</strong>
    <span th:text="${booking.owner.firstName}"></span>
    <span th:text="${booking.owner.lastName}"></span>
</p>

<p>
    <strong>Sitter:</strong>
    <span th:text="${booking.sitter.firstName}"></span>
    <span th:text="${booking.sitter.lastName}"></span>
</p>

    <p>
        <strong>Status:</strong>
        <span th:text="${booking.status}"></span>
    </p>

</div>

</div>

</body>
</html>
