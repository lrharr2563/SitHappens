<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Request Booking - SitHappens</title>

    <style>
        /* page styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            padding: 40px;
            margin: 0;
        }

        /* main container */
        .container {
            max-width: 850px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        /* form inputs */
        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        /* submit button */
        button {
            padding: 10px 15px;
            background-color: #27ae60;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #219150;
        }

        /* calendar layout */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 25px;
        }

        /* calendar day */
        .calendar-day {
            padding: 14px;
            text-align: center;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            min-height: 40px;
        }

        .available { background-color: #4CAF50; }
        .pending { background-color: #ff9800; }
        .booked { background-color: #f44336; }
        .empty { background-color: #bdc3c7; }

        h3 {
            margin-top: 40px;
        }

        h4 {
            margin-top: 20px;
            margin-bottom: 5px;
            color: #2c3e50;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        /* error message */
        .error {
            color: red;
            font-weight: bold;
        }

    </style>
</head>
<body>

<div class="container">

    <h2>Request Service</h2>

    <!-- safety check if sitter is missing -->
    <div th:if="${sitter == null}" class="error">
        Error: Sitter not found.
    </div>

    <!-- sitter info -->
    <p>
        Requesting service from:
        <strong>
            <span th:text="${sitter != null ? sitter.firstName : 'Unknown'}"></span>
            <span th:text="${sitter != null ? sitter.lastName : ''}"></span>
        </strong>
    </p>

    <!-- booking form -->
    <form th:action="@{/request-booking}" method="post">

        <!-- hidden sitter id -->
        <input type="hidden" name="sitterId"
               th:value="${sitter != null ? sitter.id : 0}" />

        <label>Select Pet:</label>
        <select name="petId" required>
            <option value="">-- Select a Pet --</option>
            <option th:each="pet : ${pets}"
                    th:value="${pet.id}"
                    th:text="${pet.name}">
            </option>
        </select>

        <label>Service Type:</label>
        <select name="serviceType" required>
            <option value="">-- Select a Service --</option>
            <option value="Overnight Pet Sitting">Overnight Pet Sitting</option>
            <option value="Dog Walking">Dog Walking</option>
            <option value="Drop-In Visit">Drop-In Visit</option>
        </select>

        <label>Start Date:</label>
        <input type="date" name="startDate" required />

        <label>End Date:</label>
        <input type="date" name="endDate" required />

        <label>Request Details:</label>
        <textarea name="requestMessage" rows="5"
                  placeholder="Hi, I am looking for care for my pet during these dates."
                  required></textarea>

        <label>Contact Info (Phone or Email):</label>
        <input type="text" name="contactInfo" placeholder="Enter phone number or email">

        <button type="submit" formmethod="post">Send Request</button>

    </form>

    <!-- availability section -->
    <h3>Sitter Availability</h3>

    <!-- loop through months -->
    <div th:each="monthEntry : ${calendarByMonth}">

        <h4 th:text="${#strings.capitalize(#strings.toLowerCase(monthEntry.key))}"></h4>

        <!-- calendar grid -->
        <div class="calendar-grid">

            <!-- each day -->
            <div th:each="entry : ${monthEntry.value}"
                 th:class="'calendar-day ' +
                    (${entry.value} == 'AVAILABLE' ? 'available' : '') +
                    (${entry.value} == 'PENDING' ? ' pending' : '') +
                    (${entry.value} == 'BOOKED' ? ' booked' : '') +
                    (${entry.value} == null ? ' empty' : '')">

                <span th:text="${#temporals.format(entry.key, 'd')}"></span>

            </div>

        </div>

    </div>

</div>

</body>
</html>
